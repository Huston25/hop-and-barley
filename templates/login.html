{% extends 'base.html' %}
{% load static %}
{% block content %}
<!-- Main Content -->
<main class="auth-page-wrapper">
  <div class="auth-background">
    <img src="{% static 'img/background/pattern.jpg' %}" alt="Background pattern">
  </div>
  <div class="auth-form-container">
    <div class="auth-container auth-container--login">
      <div class="Legend">
        <a href="{% url 'users:register' %}">Sign up</a>
      </div>

      <form method="post" action="{% url 'users:login' %}"  class="auth-form" id="login-form">
          {% csrf_token %}
          {{ form.non_field_errors }}
        <div class="InputField">
          <label for="{{ form.username.id_for_label }}">Username</label>
            {{ form.username }}
        </div>
        <div class="InputField">
          <label for="{{ form.password.id_for_label }}">Password</label>
            {{ form.password }}
        </div>

        <div class="ButtonGroup">

          <button type="submit" class="button button--primary">Sign In</button>
        </div>

        <div class="TextLink">
          <a href="{% url 'users:forgot_password' %}">Forgot password?</a>
        </div>
      </form>

      <p class="auth-switch">Don’t have an account? <a href="{% url 'users:register' %}">Sign up</a></p>
    </div>
  </div>
</main>
{% endblock %}
