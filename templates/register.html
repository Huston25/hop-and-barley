{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- Main Content -->
<main class="auth-page-wrapper">
    <div class="auth-background">
        <img src="{% static 'img/background/pattern.jpg' %}" alt="Background pattern">
    </div>
    <div class="auth-form-container">
        <div class="auth-container auth-container--register">
            <div class="Legend">
                <h1 class="auth-title">Register</h1>
            </div>

            <form method="post" class="auth-form" id="register-form">
                {% csrf_token %}
                <div class="InputField">
                    <label for="{{ form.username.id_for_label }}">Username</label>
                    {{ form.username }}
                    {{ form.username.errors }}
                </div>
                <div class="InputField">
                    <label for="{{ form.email.id_for_label }}">Email</label>
                    {{ form.email }}
                    {{ form.email.errors }}
                </div>
                <div class="InputField">
                    <label for="{{ form.password1.id_for_label }}">Password</label>
                    {{ form.password1 }}
                </div>
                <div class="InputField">
                    <label for="{{ form.password2.id_for_label }}">Confirm Password</label>
                    {{ form.password2 }}
                    {{ form.password2.errors }}
                </div>

<!--                <div class="CheckboxField">-->
<!--                    <label class="checkbox-container">Remember me-->
<!--                        <input type="checkbox" checked>-->
<!--                        <span class="checkmark"></span>-->
<!--                    </label>-->
<!--                </div>-->

                <div class="ButtonGroup">
                    <button type="submit" class="button button--primary">Register</button>
                </div>
            </form>

            <p class="auth-switch">Already have an account? <a href="{% url 'users:login' %}">Sign in</a></p>
        </div>
    </div>
</main>


{% endblock %}
