{% extends 'base.html' %}
{% load static %}

{% block content %}
<main class="auth-page-wrapper">
    <div class="auth-background">
        <img src="{% static 'img/background/pattern.jpg' %}" alt="Background pattern">
    </div>

    <div class="auth-form-container">
        <div class="auth-container auth-container--forgot-password">

            <div class="Legend">
                <h1 class="auth-title">Check your email</h1>
            </div>

            <p class="auth-description">
                We've emailed you instructions for resetting your password.
                If an account with that email exists, you should receive the
                message shortly.
            </p>

            <div class="ButtonGroup ButtonGroup--center">
                <a href="{% url 'users:login' %}" class="button button--primary">
                    Back to Sign In
                </a>
            </div>

        </div>
    </div>
</main>
{% endblock %}
